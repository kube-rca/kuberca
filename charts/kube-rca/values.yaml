  ingress:
    enabled: false
    ingressClassName: ''
    annotations: {}
    hosts: []
    paths:
      - /
    pathType: Prefix
    tls: []
  resources: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

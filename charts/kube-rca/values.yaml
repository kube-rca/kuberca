nameOverride: ''
fullnameOverride: ''
language: en
hooks:
  enabled: true
  waitJob:
    image:
      repository: busybox
      tag: '1.36'
      pullPolicy: IfNotPresent
    backoffLimit: 6
    activeDeadlineSeconds: 300
    checkInterval: 5
    checkTimeout: 10
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 50m
        memory: 32Mi
  waitForDb:
    enabled: false
  waitForBackend:
    enabled: false
    healthPath: /ping
  waitForAgent:
    enabled: false
    healthPath: /healthz
postgresql:
  auth:
    username: kube-rca
    database: kube-rca
    existingSecret: postgresql
    secretKeys:
      adminPasswordKey: postgres-password
      userPasswordKey: password
  primary:
    initdb:
      scripts:
        enable-pgvector.sh: >
          #!/bin/sh

          set -e

          DB_USER="postgres"

          if [ -n "${POSTGRES_POSTGRES_PASSWORD_FILE:-}" ] && [ -f
          "$POSTGRES_POSTGRES_PASSWORD_FILE" ]; then
            PGPASSWORD="$(cat "$POSTGRES_POSTGRES_PASSWORD_FILE")"
          elif [ -n "${POSTGRES_POSTGRES_PASSWORD:-}" ]; then
            PGPASSWORD="$POSTGRES_POSTGRES_PASSWORD"
          else
            DB_USER="${POSTGRES_USER:-postgres}"
            if [ -n "${POSTGRES_PASSWORD_FILE:-}" ] && [ -f "$POSTGRES_PASSWORD_FILE" ]; then
              PGPASSWORD="$(cat "$POSTGRES_PASSWORD_FILE")"
            elif [ -n "${POSTGRES_PASSWORD:-}" ]; then
              PGPASSWORD="$POSTGRES_PASSWORD"
            fi
          fi

          export PGPASSWORD

          DB_NAME="${POSTGRES_DATABASE:-kube-rca}"

          psql -U "$DB_USER" -d "$DB_NAME" -c "CREATE EXTENSION IF NOT EXISTS
          vector;"
backend:
  replicaCount: 1
  image:
    repository: ghcr.io/kube-rca/backend
    tag: 1.4.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  containerPort: 8080
  ingress:
    enabled: false
    ingressClassName: ''
    annotations: {}
    hosts: []
    paths:
      - /
    pathType: Prefix
    tls: []
  resources: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  embedding:
    provider: gemini
    model: gemini-embedding-001
    apiKey:
      value: ''
      existingSecret: kube-rca-ai
      key: ai-studio-api-key
  waitForDb:
    enabled: true
    checkTimeout: 5
    checkInterval: 2
  postgresql:
    host: ''
    port: 5432
    user: kube-rca
    database: kube-rca
    secret:
      existingSecret: postgresql
      key: password
    retry:
      maxAttempts: 10
      initialBackoffSeconds: 1
      maxBackoffSeconds: 30
  slack:
    enabled: true
    token: ''
    channelId: ''
    secret:
      existingSecret: kube-rca-slack
      tokenKey: kube-rca-slack-token
      channelIdKey: kube-rca-slack-channel-id
  flapping:
    enabled: true
    detectionWindowMinutes: 30
    cycleThreshold: 3
    clearanceWindowMinutes: 30
  analysis:
    manualAnalyzeSeverities: ''
  auth:
    enabled: true
    allowSignup: false
    admin:
      username: kube-rca
      password: kube-rca
    jwt:
      secret: ''
      accessTtl: 15m
      refreshTtl: 168h
    cookie:
      secure: true
      sameSite: Lax
      domain: ''
      path: /
    oidc:
      enabled: false
      issuer: https://accounts.google.com
      redirectUri: ''
      allowedDomains: []
      allowedEmails: []
      secret:
        existingSecret: ''
        keys:
          clientId: oidc-client-id
          clientSecret: oidc-client-secret
    cors:
      allowedOrigins: []
    secret:
      existingSecret: ''
      name: ''
      keys:
        adminUsername: admin-username
        adminPassword: admin-password
        jwtSecret: kube-rca-jwt-secret
  webhookSecret:
    existingSecret: ''
    key: hmac-secret
    headerName: X-Webhook-Signature
    rateLimitPerMinute: 100
agent:
  replicaCount: 2
  image:
    repository: ghcr.io/kube-rca/agent
    tag: 1.4.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  ingress:
    enabled: false
    ingressClassName: ''
    annotations: {}
    hosts: []
    paths:
      - /
    pathType: Prefix
    tls: []
  resources: {}
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  securityContext: {}
  logLevel: info
  workers: 1
  aiProvider: gemini
  k8s:
    apiTimeoutSeconds: 5
    eventLimit: 25
    logTailLines: 25
  prompt:
    tokenBudget: 32000
    maxLogLines: 25
    maxEvents: 25
    summaryMaxItems: 3
  masking:
    regexList: []
    builtinRedaction: true
    builtinRedactionHashMode: false
  prometheus:
    url: ''
    httpTimeoutSeconds: 5
  tempo:
    url: ''
    httpTimeoutSeconds: 10
    tenantId: ''
    traceLimit: 5
    lookbackMinutes: 15
    forwardMinutes: 5
  loki:
    url: ''
    httpTimeoutSeconds: 10
    tenantId: ''
  istio:
    enabled: false
  gemini:
    modelId: gemini-3-flash-preview
    apiKey: ''
    secret:
      create: false
      existingSecret: kube-rca-ai
      key: ai-studio-api-key
  openai:
    modelId: gpt-5.4-mini
    apiKey: ''
    secret:
      create: false
      existingSecret: kube-rca-ai
      key: openai-api-key
  anthropic:
    modelId: claude-sonnet-4-6
    maxTokens: 8192
    apiKey: ''
    secret:
      create: false
      existingSecret: kube-rca-ai
      key: anthropic-api-key
  sessionDB:
    host: ''
    port: 5432
    name: ''
    user: ''
    secret:
      existingSecret: postgresql
      key: password
  cache:
    size: 128
    ttlSeconds: 0
  retry:
    maxAttempts: 10
    minWait: 1
    maxWait: 30
    totalTimeout: 300
  session:
    windowSize: 40
  nodeSelector: {}
  tolerations: []
  affinity: {}
frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/kube-rca/frontend
    tag: 1.4.0

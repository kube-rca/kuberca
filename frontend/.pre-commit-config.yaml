repos:
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: bash
        args:
          - -c
          - |
              command -v npx >/dev/null 2>&1 || { echo "pre-commit: npx not found. Install Node.js to run ESLint." >&2; exit 1; }
              if [ ! -d node_modules ]; then
                echo "pre-commit: node_modules not found. Run 'npm install' first." >&2
                exit 1
              fi
              npm run lint
        language: system
        files: \.(ts|tsx|js|jsx|cjs)$
        pass_filenames: false
        stages: [pre-commit]

apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ratings-fault-abort
spec:
  hosts:
  - ratings
  http:
  - fault:
      abort:
        percentage:
          value: 40
        httpStatus: 404
    route:
    - destination:
        host: ratings
        port:
          number: 9080

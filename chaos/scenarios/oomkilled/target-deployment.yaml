apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-oom-target
  labels:
    app: chaos-oom-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-oom-target
  template:
    metadata:
      labels:
        app: chaos-oom-target
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c", "sleep 3600"]
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "64Mi"

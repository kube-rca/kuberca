apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-oom-target
  namespace: kube-rca
  labels:
    app: chaos-oom-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-oom-target
  template:
    metadata:
      labels:
        app: chaos-oom-target
    spec:
      containers:
        - name: oom-target
          image: busybox:1.36.1
          command: ["sh", "-c", "sleep 3600"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

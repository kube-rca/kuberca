apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-oom-target
  labels:
    app: chaos-oom-target
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-oom-target
  template:
    metadata:
      labels:
        app: chaos-oom-target
    spec:
      containers:
      - name: app
        image: busybox:1.36
        command: ["sh", "-c", "i=0; while true; do dd if=/dev/zero of=/mem/oom bs=4M count=1 seek=$i 2>/dev/null; i=$((i+1)); done"]
        resources:
          requests:
            memory: "32Mi"
          limits:
            memory: "64Mi"
        volumeMounts:
        - name: mem
          mountPath: /mem
      volumes:
      - name: mem
        emptyDir:
          medium: Memory
          sizeLimit: "128Mi"

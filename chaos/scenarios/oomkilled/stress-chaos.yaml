apiVersion: chaos-mesh.org/v1alpha1
kind: Schedule
metadata:
  name: reviews-oom-schedule
  namespace: kube-rca
spec:
  schedule: "@every 1m"
  type: "StressChaos"
  historyLimit: 1
  concurrencyPolicy: "Forbid"
  stressChaos:
    mode: one
    selector:
      labelSelectors:
        app: chaos-oom-target
    stressors:
      memory:
        workers: 1
        size: 256MiB
        oomScoreAdj: -1000
    duration: "40s"
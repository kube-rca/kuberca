name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday 03:17 UTC. Time picked off-the-hour to avoid global cron storms.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read
  packages: read   # required to fetch internal / private CodeQL packs

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # `actions` scans the workflow files themselves for supply-chain
          # smells (e.g. unsafe ${{ }} interpolation in shell, untrusted
          # checkouts). Cheap and high-signal for a hardening initiative.
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go (Go analysis only)
        if: matrix.language == 'go'
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734 # v3.35.2
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Default + security-extended pack for higher recall on the security tier.
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b2f9ef845756500b97acbdaf5c1dd4e9c1d15734 # v3.35.2
        with:
          category: "/language:${{ matrix.language }}"

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday 03:17 UTC. Time picked off-the-hour to avoid global cron storms.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write   # upload CodeQL SARIF results
      actions: read
      packages: read           # fetch internal / private CodeQL packs
    strategy:
      fail-fast: false
      matrix:
        include:
          # `actions` scans the workflow files themselves for supply-chain
          # smells (e.g. unsafe ${{ }} interpolation in shell, untrusted
          # checkouts). Cheap and high-signal for a hardening initiative.
          - language: actions
            build-mode: none
          - language: go
            build-mode: autobuild
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go (Go analysis only)
        if: matrix.language == 'go'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Default + security-extended pack for higher recall on the security tier.
          queries: security-extended
          # Layer in project-local data-extension packs (e.g. logutil.Sanitize
          # as a go/log-injection barrier). Harmless on non-Go matrix entries —
          # the Go-only pack simply doesn't apply when the target language differs.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"

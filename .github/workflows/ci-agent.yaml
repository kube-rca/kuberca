name: CI Agent

on:
  push:
    branches: [main]
    paths: ['agent/**']
  pull_request:
    paths: ['agent/**']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: agent
        run: uv pip install --system ".[dev]"
      - name: Lint
        working-directory: agent
        run: ruff check .
      - name: Test
        working-directory: agent
        run: pytest

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: agent
        run: uv pip install --system ".[dev]"
      - name: Lint
        working-directory: agent
        run: ruff check .
      - name: Test
        working-directory: agent
        run: pytest
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          role-session-name: github-actions-agent
      - name: Login to ECR Public
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
      - name: Set image tag
        id: tag
        run: echo "image_tag=agent-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "${{ steps.ecr.outputs.registry }}/r5b7j2e4/kube-rca-ecr/agent:${{ steps.tag.outputs.image_tag }}" \
            agent/
          docker push \
            "${{ steps.ecr.outputs.registry }}/r5b7j2e4/kube-rca-ecr/agent:${{ steps.tag.outputs.image_tag }}"
      - name: Update helm values (agent image tag)
        uses: mikefarah/yq@v4.50.1
        with:
          cmd: yq -i '.agent.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and push helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/kube-rca/kube-rca-values.yaml
          git diff --cached --quiet || git commit -m "chore(charts): bump agent image to ${{ steps.tag.outputs.image_tag }}"
          git pull --rebase origin main
          git push

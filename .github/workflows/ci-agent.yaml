name: CI Agent

on:
  push:
    branches: [main]
    paths: ['agent/**']
  pull_request:
    paths: ['agent/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: agent
        run: uv pip install --system ".[dev]"
      - name: Lint (ruff)
        working-directory: agent
        run: ruff check .
      - name: Type check (mypy)
        working-directory: agent
        # Soft-allow legacy code via --ignore-missing-imports until the agent codebase
        # has full annotations. The CI gate is "no new mypy errors", not "100% strict".
        run: mypy --ignore-missing-imports app
        continue-on-error: true
      - name: Security scan (bandit)
        working-directory: agent
        # Blocking gate: high-severity + high-confidence findings only (-ll -ii).
        # Pre-existing low-severity findings (B105 placeholder, B112 fault-tolerant
        # loop) are annotated with `# nosec BXXX` + justification at the call site.
        run: |
          uvx --from bandit bandit -r app -ll -ii
      - name: Vulnerability scan (pip-audit)
        working-directory: agent
        run: |
          uvx --from pip-audit pip-audit --strict --disable-pip || true
        # pip-audit is informational on PRs (it can flake on transient PyPI errors);
        # the dependency-review workflow is the blocking gate for CVE introduction.
      - name: Test (coverage)
        working-directory: agent
        # --cov-fail-under=65: prometheus / session_repository / k8s now covered
        # via fakes + testcontainers (pgvector/pgvector:pg16).
        # Measured baseline after this change is ~68 %+, gate set 3 pp below
        # to absorb minor variance without blocking PRs.
        run: pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=65
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: agent/coverage.xml
          flags: agent
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the chart-bump branch (never main directly)
      packages: write        # push image to GHCR
      pull-requests: write   # open/update the chart-bump PR
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # full history so the bump branch can merge origin/main
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: agent
        run: uv pip install --system ".[dev]"
      - name: Lint
        working-directory: agent
        run: ruff check .
      - name: Test
        working-directory: agent
        run: pytest
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "image_tag=agent-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/kube-rca/agent:${{ steps.tag.outputs.image_tag }}" \
            agent/
          docker push \
            "ghcr.io/kube-rca/agent:${{ steps.tag.outputs.image_tag }}"
      - name: Prepare chart-bump branch
        run: |
          set -euo pipefail
          BRANCH="ci/bump-agent-image"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # actions/checkout narrows remote.origin.fetch to the triggering ref,
          # so fetch main (and the bump branch, when it exists) with explicit
          # refspecs to guarantee the remote-tracking refs are present.
          git fetch origin "+refs/heads/main:refs/remotes/origin/main"

          # Idempotent branch: reuse the dedicated bump branch if it exists, else
          # fork it from main. Merge main (never rebase) so the push stays a
          # fast-forward and needs no --force. `-X theirs` auto-resolves a
          # concurrently re-touched image-tag line instead of leaving a conflict
          # that strands the workflow; yq re-sets the tag in the next step.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git merge --no-edit -X theirs origin/main
          else
            git checkout -B "$BRANCH" origin/main
          fi
      - name: Update helm values (agent image tag)
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3
        with:
          cmd: yq -i '.agent.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and open or update chart image-bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          set -euo pipefail
          BRANCH="ci/bump-agent-image"
          FILE="charts/kube-rca/kube-rca-values.yaml"
          TITLE="chore(charts): bump agent image to ${IMAGE_TAG}"

          git add "$FILE"
          if git diff --cached --quiet; then
            echo "Chart already at ${IMAGE_TAG}; nothing to commit."
          else
            git commit -m "$TITLE"
          fi

          # Fast-forward push only (no --force); safe because this branch is
          # written exclusively by CI.
          git push origin "$BRANCH"

          if [ "$(git rev-list --count "origin/main..$BRANCH")" -eq 0 ]; then
            echo "Branch has no changes relative to main; skipping PR."
            exit 0
          fi

          if [ "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length')" -gt 0 ]; then
            echo "Open PR already tracks $BRANCH; the push updated it."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated chart image-tag bump from CI (workflow: ${GITHUB_WORKFLOW}, commit: ${GITHUB_SHA}). Sets .agent.image.tag to ${IMAGE_TAG} in ${FILE}."
          fi

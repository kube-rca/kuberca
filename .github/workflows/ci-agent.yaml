name: CI Agent

on:
  push:
    branches: [main]
    paths: ['agent/**']
  pull_request:
    paths: ['agent/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: agent
        run: uv pip install --system ".[dev]"
      - name: Lint (ruff)
        working-directory: agent
        run: ruff check .
      - name: Type check (mypy)
        working-directory: agent
        # Soft-allow legacy code via --ignore-missing-imports until the agent codebase
        # has full annotations. The CI gate is "no new mypy errors", not "100% strict".
        run: mypy --ignore-missing-imports app
        continue-on-error: true
      - name: Security scan (bandit)
        working-directory: agent
        # Blocking gate: high-severity + high-confidence findings only (-ll -ii).
        # Pre-existing low-severity findings (B105 placeholder, B112 fault-tolerant
        # loop) are annotated with `# nosec BXXX` + justification at the call site.
        run: |
          uvx --from bandit bandit -r app -ll -ii
      - name: Vulnerability scan (pip-audit)
        working-directory: agent
        run: |
          uvx --from pip-audit pip-audit --strict --disable-pip || true
        # pip-audit is informational on PRs (it can flake on transient PyPI errors);
        # the dependency-review workflow is the blocking gate for CVE introduction.
      - name: Test (coverage)
        working-directory: agent
        # --cov-fail-under=55: measured baseline after W3 additions is 57.79 %.
        # The gap to 70 % is driven by strands_agent.py (LLM integration,
        # 55 %), session_repository.py (Postgres, 23 %), and prometheus.py
        # (live scrape, 20 %) — all require real infrastructure to cover fully.
        # Threshold is set 3 pp below current to absorb minor measurement
        # variance without blocking PRs on pre-existing infra-bound paths.
        run: pytest --cov=app --cov-report=xml --cov-report=term --cov-fail-under=55
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: agent/coverage.xml
          flags: agent
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit helm-values bump back to main
      id-token: write   # AWS OIDC for ECR Public push
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install --upgrade pip uv
      - name: Install dependencies
        working-directory: agent
        run: uv pip install --system ".[dev]"
      - name: Lint
        working-directory: agent
        run: ruff check .
      - name: Test
        working-directory: agent
        run: pytest
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          role-session-name: github-actions-agent
      - name: Login to ECR Public
        id: ecr
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1
        with:
          registry-type: public
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
      - name: Set image tag
        id: tag
        run: echo "image_tag=agent-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "${{ steps.ecr.outputs.registry }}/r5b7j2e4/kube-rca-ecr/agent:${{ steps.tag.outputs.image_tag }}" \
            agent/
          docker push \
            "${{ steps.ecr.outputs.registry }}/r5b7j2e4/kube-rca-ecr/agent:${{ steps.tag.outputs.image_tag }}"
      - name: Update helm values (agent image tag)
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq -i '.agent.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and push helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/kube-rca/kube-rca-values.yaml
          git diff --cached --quiet || git commit -m "chore(charts): bump agent image to ${{ steps.tag.outputs.image_tag }}"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push failed (attempt $i/5). Retrying in 2s..."
            sleep 2
          done
          echo "Failed to push after 5 attempts."
          exit 1

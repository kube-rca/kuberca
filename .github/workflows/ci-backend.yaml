name: CI Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # backend/go.mod sets `toolchain go1.25.9` while setup-go installs 1.25.0
      # from the `go 1.25.0` directive. Without `GOTOOLCHAIN=local`, `go install`
      # of gosec / govulncheck triggers an auto-toolchain download that mixes
      # 1.25.9 compile binaries with the 1.25.0 go tool, producing
      # `compile: version "go1.25.9" does not match go tool version "go1.25.0"`.
      # Pin to the locally provisioned toolchain for the whole job.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.11'
          check-latest: true
      - name: Format check
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4
          working-directory: backend
          args: --timeout=5m
      - name: Install gosec
        # v2.25.0 brings in golang.org/x/tools that compiles cleanly under
        # Go 1.25 (older versions hit an integer-overflow array length in
        # tokeninternal). Pin to the published release rather than @latest
        # so the build is reproducible.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
      - name: gosec
        working-directory: backend
        run: gosec -severity medium -confidence medium -exclude-dir=docs ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: backend
        run: govulncheck ./...
      - name: Test (race + coverage)
        working-directory: backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage gate (≥30 % on internal packages)
        # docs/docs.go (auto-generated Swagger, ~2300 lines) and main.go
        # (ASGI entrypoint) contribute 0 % coverable statements and dilute the
        # total. Scoping to ./internal/... gives an accurate signal for
        # business-logic coverage. Threshold bumped from 25 % → 30 % now that
        # internal/db is covered via testcontainers-go integration tests
        # (pgvector/pgvector:pg16) which exercise real SQL round-trips, cosine
        # similarity searches, and alert/incident state-machine transitions.
        working-directory: backend
        run: |
          go test -coverprofile=coverage-internal.out -covermode=atomic \
            -coverpkg=./internal/... ./internal/...
          TOTAL=$(go tool cover -func=coverage-internal.out \
            | awk '/^total:/ { gsub(/%/,"",$3); printf "%d", $3+0 }')
          echo "Internal package coverage: ${TOTAL}%"
          if [ "${TOTAL}" -lt 30 ]; then
            echo "::error::Coverage ${TOTAL}% is below the 30% gate (internal packages)"
            exit 1
          fi
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4.6.0
        with:
          files: backend/coverage.out
          flags: backend
          # Token is optional for public repos; pass via repo secret if available.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit helm-values bump back to main
      packages: write   # push image to GHCR
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "image_tag=backend-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/kube-rca/backend:${{ steps.tag.outputs.image_tag }}" \
            backend/
          docker push \
            "ghcr.io/kube-rca/backend:${{ steps.tag.outputs.image_tag }}"
      - name: Update helm values (backend image tag)
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3
        with:
          cmd: yq -i '.backend.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and push helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/kube-rca/kube-rca-values.yaml
          git diff --cached --quiet || git commit -m "chore(charts): bump backend image to ${{ steps.tag.outputs.image_tag }}"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push failed (attempt $i/5). Retrying in 2s..."
            sleep 2
          done
          echo "Failed to push after 5 attempts."
          exit 1

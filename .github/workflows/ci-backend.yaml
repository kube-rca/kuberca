name: CI Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # backend/go.mod sets `toolchain go1.25.9` while setup-go installs 1.25.0
      # from the `go 1.25.0` directive. Without `GOTOOLCHAIN=local`, `go install`
      # of gosec / govulncheck triggers an auto-toolchain download that mixes
      # 1.25.9 compile binaries with the 1.25.0 go tool, producing
      # `compile: version "go1.25.9" does not match go tool version "go1.25.0"`.
      # Pin to the locally provisioned toolchain for the whole job.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.11'
          check-latest: true
      - name: Format check
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.11.4
          working-directory: backend
          args: --timeout=5m
      - name: Install gosec
        # v2.25.0 brings in golang.org/x/tools that compiles cleanly under
        # Go 1.25 (older versions hit an integer-overflow array length in
        # tokeninternal). Pin to the published release rather than @latest
        # so the build is reproducible.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
      - name: gosec
        working-directory: backend
        run: gosec -severity medium -confidence medium -exclude-dir=docs ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: backend
        run: govulncheck ./...
      - name: Test (race + coverage)
        working-directory: backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage gate (≥30 % on internal packages)
        # docs/docs.go (auto-generated Swagger, ~2300 lines) and main.go
        # (ASGI entrypoint) contribute 0 % coverable statements and dilute the
        # total. Scoping to ./internal/... gives an accurate signal for
        # business-logic coverage. Threshold bumped from 25 % → 30 % now that
        # internal/db is covered via testcontainers-go integration tests
        # (pgvector/pgvector:pg16) which exercise real SQL round-trips, cosine
        # similarity searches, and alert/incident state-machine transitions.
        working-directory: backend
        run: |
          go test -coverprofile=coverage-internal.out -covermode=atomic \
            -coverpkg=./internal/... ./internal/...
          TOTAL=$(go tool cover -func=coverage-internal.out \
            | awk '/^total:/ { gsub(/%/,"",$3); printf "%d", $3+0 }')
          echo "Internal package coverage: ${TOTAL}%"
          if [ "${TOTAL}" -lt 30 ]; then
            echo "::error::Coverage ${TOTAL}% is below the 30% gate (internal packages)"
            exit 1
          fi
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: backend/coverage.out
          flags: backend
          # Token is optional for public repos; pass via repo secret if available.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write        # push the chart-bump branch (never main directly)
      packages: write        # push image to GHCR
      pull-requests: write   # open/update the chart-bump PR
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0   # full history so the bump branch can merge origin/main
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "image_tag=backend-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/kube-rca/backend:${{ steps.tag.outputs.image_tag }}" \
            backend/
          docker push \
            "ghcr.io/kube-rca/backend:${{ steps.tag.outputs.image_tag }}"
      - name: Prepare chart-bump branch
        run: |
          set -euo pipefail
          BRANCH="ci/bump-backend-image"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # actions/checkout narrows remote.origin.fetch to the triggering ref,
          # so fetch main (and the bump branch, when it exists) with explicit
          # refspecs to guarantee the remote-tracking refs are present.
          git fetch origin "+refs/heads/main:refs/remotes/origin/main"

          # Idempotent branch: reuse the dedicated bump branch if it exists, else
          # fork it from main. Merge main (never rebase) so the push stays a
          # fast-forward and needs no --force. `-X theirs` auto-resolves a
          # concurrently re-touched image-tag line instead of leaving a conflict
          # that strands the workflow; yq re-sets the tag in the next step.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git fetch origin "+refs/heads/$BRANCH:refs/remotes/origin/$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git merge --no-edit -X theirs origin/main
          else
            git checkout -B "$BRANCH" origin/main
          fi
      - name: Update helm values (backend image tag)
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3
        with:
          cmd: yq -i '.backend.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and open or update chart image-bump PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}
        run: |
          set -euo pipefail
          BRANCH="ci/bump-backend-image"
          FILE="charts/kube-rca/kube-rca-values.yaml"
          TITLE="chore(charts): bump backend image to ${IMAGE_TAG}"

          git add "$FILE"
          if git diff --cached --quiet; then
            echo "Chart already at ${IMAGE_TAG}; nothing to commit."
          else
            git commit -m "$TITLE"
          fi

          # Fast-forward push only (no --force); safe because this branch is
          # written exclusively by CI.
          git push origin "$BRANCH"

          if [ "$(git rev-list --count "origin/main..$BRANCH")" -eq 0 ]; then
            echo "Branch has no changes relative to main; skipping PR."
            exit 0
          fi

          if [ "$(gh pr list --head "$BRANCH" --base main --state open --json number --jq 'length')" -gt 0 ]; then
            echo "Open PR already tracks $BRANCH; the push updated it."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "Automated chart image-tag bump from CI (workflow: ${GITHUB_WORKFLOW}, commit: ${GITHUB_SHA}). Sets .backend.image.tag to ${IMAGE_TAG} in ${FILE}."
          fi

name: CI Backend

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    paths: ['backend/**']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # backend/go.mod sets `toolchain go1.25.9` while setup-go installs 1.25.0
      # from the `go 1.25.0` directive. Without `GOTOOLCHAIN=local`, `go install`
      # of gosec / govulncheck triggers an auto-toolchain download that mixes
      # 1.25.9 compile binaries with the 1.25.0 go tool, producing
      # `compile: version "go1.25.9" does not match go tool version "go1.25.0"`.
      # Pin to the locally provisioned toolchain for the whole job.
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.9'
          check-latest: true
      - name: Format check
        working-directory: backend
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Unformatted files:"
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        working-directory: backend
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4
          working-directory: backend
          args: --timeout=5m
      - name: Install gosec
        # v2.25.0 brings in golang.org/x/tools that compiles cleanly under
        # Go 1.25 (older versions hit an integer-overflow array length in
        # tokeninternal). Pin to the published release rather than @latest
        # so the build is reproducible.
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0
      - name: gosec
        working-directory: backend
        run: gosec -severity medium -confidence medium -exclude-dir=docs ./...
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        working-directory: backend
        run: govulncheck ./...
      - name: Test (race + coverage)
        working-directory: backend
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@0f8570b1a125f4937846a11fcfa3bcd548bd8c97 # v4.6.0
        with:
          files: backend/coverage.out
          flags: backend
          # Token is optional for public repos; pass via repo secret if available.
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
          role-session-name: github-actions-backend
      - name: Login to ECR Public
        id: ecr
        uses: aws-actions/amazon-ecr-login@4625ce35226a7557230889aae2f52eb50ec3dcda # v2.0.1
        with:
          registry-type: public
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1
      - name: Set image tag
        id: tag
        run: echo "image_tag=backend-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "${{ steps.ecr.outputs.registry }}/r5b7j2e4/kube-rca-ecr/backend:${{ steps.tag.outputs.image_tag }}" \
            backend/
          docker push \
            "${{ steps.ecr.outputs.registry }}/r5b7j2e4/kube-rca-ecr/backend:${{ steps.tag.outputs.image_tag }}"
      - name: Update helm values (backend image tag)
        uses: mikefarah/yq@751d8ad57b84f1794661bc70c0afb92a22ad7b3c # v4.53.2
        with:
          cmd: yq -i '.backend.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and push helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/kube-rca/kube-rca-values.yaml
          git diff --cached --quiet || git commit -m "chore(charts): bump backend image to ${{ steps.tag.outputs.image_tag }}"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push failed (attempt $i/5). Retrying in 2s..."
            sleep 2
          done
          echo "Failed to push after 5 attempts."
          exit 1

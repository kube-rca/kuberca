name: CI Frontend

on:
  push:
    branches: [main]
    paths: ['frontend/**']
  pull_request:
    paths: ['frontend/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: frontend/package.json
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Type check (tsc --noEmit)
        working-directory: frontend
        run: npx --no-install tsc --noEmit
      - name: Test (vitest, gated)
        # The vitest harness lands as part of W3. Until then this step is a no-op.
        if: ${{ hashFiles('frontend/vitest.config.ts', 'frontend/vitest.config.js', 'frontend/vitest.config.mjs') != '' }}
        working-directory: frontend
        run: npm run test -- --coverage
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: a11y scan (axe)
        # Best-effort — the production UI may have pre-existing warnings.
        # Soft-fail keeps the signal visible without blocking PRs until W3 cleanup.
        working-directory: frontend
        continue-on-error: true
        run: |
          npx --yes serve -s dist -l 4173 &
          SERVER_PID=$!
          sleep 3
          npx --yes @axe-core/cli http://localhost:4173 --exit || true
          kill $SERVER_PID || true

  build-and-push:
    if: github.ref_name == 'main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit helm-values bump back to main
      packages: write   # push image to GHCR
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set image tag
        id: tag
        run: echo "image_tag=frontend-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        run: |
          docker build \
            -t "ghcr.io/kube-rca/frontend:${{ steps.tag.outputs.image_tag }}" \
            frontend/
          docker push \
            "ghcr.io/kube-rca/frontend:${{ steps.tag.outputs.image_tag }}"
      - name: Update helm values (frontend image tag)
        uses: mikefarah/yq@1b9b4ac5187171d2e5e3129be0cfa827c7f9d53d # v4.53.3
        with:
          cmd: yq -i '.frontend.image.tag = "${{ steps.tag.outputs.image_tag }}"' charts/kube-rca/kube-rca-values.yaml
      - name: Commit and push helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add charts/kube-rca/kube-rca-values.yaml
          git diff --cached --quiet || git commit -m "chore(charts): bump frontend image to ${{ steps.tag.outputs.image_tag }}"

          for i in 1 2 3 4 5; do
            git pull --rebase origin main
            if git push origin main; then
              exit 0
            fi
            echo "Push failed (attempt $i/5). Retrying in 2s..."
            sleep 2
          done
          echo "Failed to push after 5 attempts."
          exit 1

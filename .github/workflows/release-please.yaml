name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # release-please creates tags/releases
      pull-requests: write   # release-please opens release PRs
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@d1a8f221d7723166f48a584aebba00ef3f6febec # v4.1.4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-images:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write       # cosign keyless + provenance attestation
      attestations: write   # actions/attest-build-provenance
      packages: write       # ghcr.io push
    strategy:
      fail-fast: false      # one component's failure must not cancel the others
      matrix:
        component: [backend, frontend, agent]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image references
        id: refs
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          GHCR_REPO="ghcr.io/kube-rca/${{ matrix.component }}"
          {
            echo "ghcr_repo=${GHCR_REPO}"
            echo "ghcr_image=${GHCR_REPO}:${TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.component }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ steps.refs.outputs.ghcr_image }}

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Cosign sign (keyless OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes "${{ steps.refs.outputs.ghcr_image }}@${{ steps.build.outputs.digest }}"

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ steps.refs.outputs.ghcr_image }}
          format: spdx-json
          artifact-name: ${{ matrix.component }}-sbom.spdx.json
          output-file: ${{ matrix.component }}-sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ steps.refs.outputs.ghcr_repo }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ steps.refs.outputs.ghcr_image }}
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          format: "table"

  publish-helm:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push chart to GHCR (OCI)
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
      - name: Add Bitnami chart repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami --force-update
      - name: Login to GHCR (OCI)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
      - name: Build chart dependencies
        run: helm dependency build charts/kube-rca
      - name: Package chart
        run: helm package charts/kube-rca
      - name: Push chart to GHCR
        run: helm push kube-rca-*.tgz oci://ghcr.io/kube-rca/charts

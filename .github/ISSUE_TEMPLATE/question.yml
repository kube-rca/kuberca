name: Question / Help
description: Ask a question about installation, configuration, or usage.
title: "[question] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For most questions, we strongly prefer
        [GitHub Discussions](https://github.com/kube-rca/kuberca/discussions)
        — it keeps the issue tracker focused on bugs and feature work, and
        lets the community help answer.

        If your question is best tracked as an issue (e.g. it relates to a
        specific bug or unclear documentation), continue below.

  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you already tried?
      description: Documentation pages read, configurations attempted, error messages encountered.

  - type: input
    id: kuberca-version
    attributes:
      label: KubeRCA version / tag
      placeholder: backend-1.0.0
